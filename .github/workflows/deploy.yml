name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

# Least privilege: the job can publish Pages and nothing else.
permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race. In-progress runs finish rather than being
# cancelled, so a half-uploaded artifact can't become the live site.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # `npm ci` (not `install`) so the build uses the exact locked dependency
      # tree — a compromised or simply newer transitive dep can't slip in.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Public config, not a secret — it's the Worker's URL. It lives in
          # repository *variables* rather than secrets to make that explicit.
          # Set it under Settings → Secrets and variables → Actions → Variables.
          # If unset, the app builds in bring-your-own-key-only mode.
          VITE_API_PROXY_URL: ${{ vars.VITE_API_PROXY_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
